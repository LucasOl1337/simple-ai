- slug: nisa
  name: Nisa AI Chatbot
  url: https://nisa.peachworlds.com
  source: awwwards
  category: chat-first
  relevance_score: 10
  visual_style: [minimalist, modern, soft]
  hero_pattern: chat-as-hero
  voice_first: false
  one_page: true
  has_dark_mode: true
  copy_tone: friendly
  takeaways:
    - Landing inteira em torno de uma interface de chat
    - Mostra o produto funcionando, nao prints estaticos
  steal:
    - Hero literal e a janela de chat
    - "Comece a conversar" como unico CTA acima da dobra
  avoid:
    - Layouts decorativos que disputem com o chat
  has_deep_dive: true

- slug: voxr
  name: VOXR AI
  url: https://voxr.ai
  source: awwwards
  category: chat-first
  relevance_score: 10
  visual_style: [minimalist, audio-led]
  hero_pattern: demo-inline
  voice_first: true
  one_page: true
  has_dark_mode: true
  copy_tone: friendly
  takeaways:
    - Vende voz como input primario sem precisar de screenshot
    - Hero usa play/audio para "demonstrar" antes de explicar
  steal:
    - Botao de microfone com peso igual (ou maior) ao de texto
    - Microcopy "Fale" como primeiro CTA
  avoid:
    - Audio auto-play sem consentimento
  has_deep_dive: true

